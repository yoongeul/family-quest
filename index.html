<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fff7cc" />
  <title> 🍀 I CAN DO IT 🐻🐰  </title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root{
      --bg:#fffdf5; --card:#ffffff; --line:#dedbd0; --text:#222;
      --muted:#777; --accent:#f6d95f; --accent2:#8fd3ff; --ok:#83d49a;
      --danger:#ffb1b1; --shadow:0 8px 24px rgba(0,0,0,.07);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:var(--bg);color:var(--text)}
    button,input,select{font:inherit}
    button{cursor:pointer}
    button:disabled{cursor:not-allowed;opacity:.55}
    .app{max-width:760px;margin:0 auto;min-height:100vh;padding-bottom:88px}
    header{position:sticky;top:0;z-index:10;background:rgba(255,253,245,.94);backdrop-filter:blur(12px);padding:16px 16px 10px;border-bottom:1px solid var(--line)}
    h1{font-size:22px;margin:0 0 10px}
    .toprow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .pill{border:1px solid var(--line);background:white;border-radius:999px;padding:9px 14px}
    .pill.active{background:var(--accent);border-color:#d6bc4c;font-weight:700}
    main{padding:14px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
    .hero{background:linear-gradient(135deg,#fff4a8,#fff);display:grid;gap:10px}
    .hero-title{font-weight:800;font-size:21px}
    .progress{height:14px;background:#eee;border-radius:999px;overflow:hidden}
    .progress > div{height:100%;background:var(--ok);width:0;transition:.25s}
    .muted{color:var(--muted);font-size:14px}
    .section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .section-title h2{font-size:18px;margin:0}
    .task{display:grid;grid-template-columns:34px 1fr auto;gap:10px;align-items:center;padding:12px 0;border-top:1px solid #eee}
    .task:first-of-type{border-top:0}
    .check{width:28px;height:28px;border-radius:9px;border:2px solid #bbb;background:white;display:grid;place-items:center;font-weight:900;padding:0}
    .check.done{background:var(--ok);border-color:var(--ok)}
    .task-name.done{text-decoration:line-through;color:#999}
    .badge{font-size:12px;padding:5px 8px;border-radius:999px;background:#f1f1f1}
    .empty{text-align:center;padding:28px 12px;color:var(--muted)}
    .status{margin-top:8px;font-size:13px;color:var(--muted)}
    nav{position:fixed;left:0;right:0;bottom:0;background:white;border-top:1px solid var(--line);display:flex;justify-content:center;z-index:20}
    nav .inner{width:760px;display:grid;grid-template-columns:repeat(3,1fr)}
    nav button{border:0;background:white;padding:12px 6px 14px;font-size:13px}
    nav button.active{font-weight:800;background:#fff9db}
    .week{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;overflow:auto}
    .daycol{min-width:115px;background:white;border:1px solid var(--line);border-radius:14px;padding:10px}
    .dayhead{font-weight:800;text-align:center;margin-bottom:8px}
    .mini{font-size:13px;padding:7px 0;border-top:1px dashed #ddd}
    .mini:first-of-type{border-top:0}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:1px solid var(--line);background:white;border-radius:12px;padding:10px 13px}
    .btn.primary{background:var(--accent);font-weight:800}
    .btn.danger{background:#fff0f0}
    .formgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .formgrid .full{grid-column:1/-1}
    label{font-size:13px;color:#555;display:block;margin-bottom:5px}
    input,select{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px;background:white}
    .days{display:flex;gap:6px;flex-wrap:wrap}
    .daybtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:white}
    .daybtn.active{background:var(--accent2);font-weight:800}
    .manager-item{display:grid;grid-template-columns:1fr auto;gap:8px;padding:12px 0;border-top:1px solid #eee}
    .manager-item:first-child{border-top:0}
    .hidden{display:none!important}
    .small{font-size:12px}
    @media(max-width:560px){
      .week{grid-template-columns:repeat(5,118px)}
      .formgrid{grid-template-columns:1fr}
      .formgrid .full{grid-column:auto}
    }
    .note-card {
      text-align: left;
    }

    .note-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 12px;
      width: 100%;
      padding: 12px 0;
    }

    .note-content {
      flex: 1;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }
    .note-actions {
      display: flex;
      gap: 6px;
      justify-self: end;
    }

  .note-type {
    flex-shrink: 0;
    display: inline-block;
    padding: 3px 7px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }

  .note-type.memo {
   background: #f1f1f1;
  }

  .note-type.notice {
    background: #fff1a8;
  }

  .note-type-picker {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }

  .note-type-picker label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 999px;
    cursor: pointer;
    width: auto;
  }

  .note-type-picker input[type="radio"] {
    width: 16px;
    height: 16px;
    margin: 0;
  }

    #noteInput {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font: inherit;
      background: white;
    }

   .study-task {
      display: grid;
      grid-template-columns: auto minmax(160px, 1fr) minmax(220px, 320px);
      align-items: center;
      gap: 14px;
    }

    .study-progress {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    .progress-note {
      width: 150px;
      min-width: 0;
      padding: 9px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 10px;
      font: inherit;
      background: #fff;
    }

    .progress-note:focus {
      outline: 2px solid rgba(246, 217, 95, 0.45);
      border-color: #e6c84f;
    }

    .parent-check {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      font-size: 14px;
      color: #666;
    }

    .parent-check input {
      width: 18px;
      height: 18px;
      margin: 0;
    }

    @media (max-width: 700px) {
      .study-task {
        grid-template-columns: auto 1fr;
      }

      .study-progress {
        grid-column: 2;
        justify-content: flex-start;
        flex-wrap: wrap;
        padding-top: 4px;
     }

      .progress-note {
        width: min(180px, 100%);
      }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>♥️ 오늘을 응원해 🍀</h1>
    <div class="toprow" id="childSwitch"></div>
    <div id="syncStatus" class="status">불러오는 중...</div>
  </header>

  <main>
    <section id="todayView"></section>
    <section id="weekView" class="hidden"></section>
    <section id="manageView" class="hidden"></section>
  </main>

  <nav>
    <div class="inner">
      <button data-view="today" class="active">✅ 오늘</button>
      <button data-view="week">📅 주간</button>
      <button data-view="manage">🧰 관리</button>
    </div>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://zuideuvsykcbwiweyzho.supabase.co";
const SUPABASE_KEY = "sb_publishable_djj2HLiCWAW3UBnnEUXb-A_KeKtrLjG";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const DAYS = ["일", "월", "화", "수", "목", "금", "토"];
const WEEKDAYS = [1, 2, 3, 4, 5];
const LOCAL_KEY = "familyQuestUiStateV2";

let currentView = "today";
let isSaving = false;

let data = {
  familyId: null,
  children: [],
  selectedChildId: null,
  selectedDate: null,
  tasks: [],
  completions: {},
  progressNotes: {},
  parentChecks: {}
};

function setStatus(message) {
  document.getElementById("syncStatus").textContent = message;
}

function saveUiState() {
  localStorage.setItem(LOCAL_KEY, JSON.stringify({
    selectedChildId: data.selectedChildId,
    selectedDate: data.selectedDate,
    currentView
  }));
}

function loadUiState() {
  try {
    const saved = JSON.parse(localStorage.getItem(LOCAL_KEY) || "{}");
    data.selectedChildId = saved.selectedChildId || null;
    data.selectedDate = saved.selectedDate || ymd(new Date());
    currentView = ["today", "week", "manage"].includes(saved.currentView)
      ? saved.currentView
      : "today";
  } catch {
    data.selectedDate = ymd(new Date());
  }
}

async function loadFromSupabase() {
  setStatus("가족 정보를 불러오는 중...");

  const { data: family, error: familyError } = await supabaseClient
    .from("families")
    .select("id, name")
    .eq("name", "우리가족")
    .maybeSingle();

  if (familyError) throw familyError;
  if (!family) throw new Error("families 테이블에 '우리가족' 행이 없어요.");

  data.familyId = family.id;

  const [childrenResult, categoriesResult, tasksResult, progressResult] = await Promise.all([
    supabaseClient
      .from("children")
      .select("id, name, color, avatar, sort_order")
      .eq("family_id", data.familyId)
      .order("sort_order", { ascending: true }),

    supabaseClient
      .from("categories")
      .select("id, family_id, name, sort_order")
      .eq("family_id", data.familyId)
      .order("sort_order", { ascending: true }),
    
    supabaseClient
      .from("tasks")
      .select(`
      id,
      family_id,
      child_id,
      name,
      category,
      category_id,
      days,
      reward_enabled,
      reward_points,
      is_active,
      sort_order,
      categories (
        id,
        name,
        sort_order
        )
      `)
      .eq("family_id", data.familyId)
      .eq("is_active", true),

    supabaseClient
      .from("progress")
      .select("id, family_id, child_id, task_id, progress_date, completed, progress_note, parent_checked")
      .eq("family_id", data.familyId)
  ]);

console.log("childrenResult", childrenResult);
console.log("categoriesResult", categoriesResult);
console.log("tasksResult", tasksResult);
console.log("progressResult", progressResult);

  if (childrenResult.error) throw childrenResult.error;
  if (tasksResult.error) throw tasksResult.error;
  if (progressResult.error) throw progressResult.error;

  data.children = childrenResult.data || [];
  data.categories = categoriesResult.data || [];

  console.log("categoriesResult.data:", categoriesResult.data);
  console.log("categoriesResult.error:", categoriesResult.error);
  console.log("familyId:", data.familyId);

  data.tasks = (tasksResult.data || [])
    .sort((a, b) => {
      const categoryOrderA = a.categories?.sort_order ?? 999;
      const categoryOrderB = b.categories?.sort_order ?? 999;

      if (categoryOrderA !== categoryOrderB) {
      return categoryOrderA - categoryOrderB;
    }

      return (a.sort_order ?? 0) - (b.sort_order ?? 0);
    })
    .map(task => ({
      ...task,
      days: Array.isArray(task.days) ? task.days.map(Number) : [],
      reward: !!task.reward_enabled
    }));

  data.completions = {};
  data.progressNotes = {};
  data.parentChecks = {};
for (const row of progressResult.data || []) {
  const key = `${row.progress_date}|${row.task_id}`;

  data.completions[key] = !!row.completed;
  data.progressNotes[key] = row.progress_note || "";
  data.parentChecks[key] = !!row.parent_checked;
}

  const selectedStillExists = data.children.some(c => c.id === data.selectedChildId);
  if (!selectedStillExists) {
    data.selectedChildId = data.children[0]?.id || null;
  }

  saveUiState();
  setStatus("☁️ Supabase와 동기화됨");
}

function ymd(date = new Date()) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function parseYmd(value) {
  if (!value) return new Date();
  const [y, m, d] = value.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function getSelectedDate() {
  return data.selectedDate ? parseYmd(data.selectedDate) : new Date();
}

function changeDate(offset) {
  const d = getSelectedDate();
  d.setDate(d.getDate() + offset);
  data.selectedDate = ymd(d);
  saveUiState();
  render();
}

function goToday() {
  data.selectedDate = ymd(new Date());
  saveUiState();
  render();
}

function pickDate(value) {
  if (!value) return;
  data.selectedDate = value;
  saveUiState();
  render();
}

function mondayOf(date = new Date()) {
  const x = new Date(date);
  const day = x.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  x.setDate(x.getDate() + diff);
  x.setHours(0, 0, 0, 0);
  return x;
}

function isDone(taskId, dateStr) {
  return !!data.completions[`${dateStr}|${taskId}`];
}

async function toggleDone(taskId, dateStr) {
  if (isSaving) return;

  const task = data.tasks.find(t => t.id === taskId);
  if (!task) return;

  const key = `${dateStr}|${taskId}`;
  const nextValue = !data.completions[key];

  data.completions[key] = nextValue;
  isSaving = true;
  setStatus("저장 중...");
  render();

  try {
    const { error } = await supabaseClient
      .from("progress")
      .upsert(
        {
          family_id: data.familyId,
          child_id: task.child_id,
          task_id: task.id,
          progress_date: dateStr,
          completed: nextValue
        },
        {
          onConflict: "child_id,task_id,progress_date"
        }
      );

    if (error) throw error;

    setStatus("☁️ 저장 완료");
  } catch (error) {
    console.error("체크 저장 실패:", error);

    data.completions[key] = !nextValue;

    setStatus("⚠️ 저장 실패");
    alert("체크 상태를 저장하지 못했어요.\n\n" + error.message);
  } finally {
    isSaving = false;
    render();
  }
}

function getProgressNote(taskId, dateStr) {
  const key = `${dateStr}|${taskId}`;
  return data.progressNotes[key] || "";
}

function isParentChecked(taskId, dateStr) {
  const key = `${dateStr}|${taskId}`;
  return !!data.parentChecks[key];
}

async function saveProgressNote(taskId, dateStr, value) {
  const task = data.tasks.find(t => t.id === taskId);
  if (!task) return;

  const key = `${dateStr}|${taskId}`;
  const previousValue = data.progressNotes[key] || "";
  const nextValue = value.trim();

  data.progressNotes[key] = nextValue;
  setStatus("저장 중...");

  try {
    const { error } = await supabaseClient
      .from("progress")
      .upsert(
        {
          family_id: data.familyId,
          child_id: task.child_id,
          task_id: task.id,
          progress_date: dateStr,
          progress_note: nextValue
        },
        {
          onConflict: "child_id,task_id,progress_date"
        }
      );

    if (error) throw error;

    setStatus("☁️ 저장 완료");
  } catch (error) {
    console.error("진도 저장 실패:", error);

    data.progressNotes[key] = previousValue;

    setStatus("⚠️ 저장 실패");
    alert("진도를 저장하지 못했어요.\n\n" + error.message);

    render();
  }
}

async function toggleParentChecked(taskId, dateStr, checked) {
  const task = data.tasks.find(t => t.id === taskId);
  if (!task) return;

  const key = `${dateStr}|${taskId}`;
  const previousValue = !!data.parentChecks[key];

  data.parentChecks[key] = checked;
  setStatus("저장 중...");

  try {
    const { error } = await supabaseClient
      .from("progress")
      .upsert(
        {
          family_id: data.familyId,
          child_id: task.child_id,
          task_id: task.id,
          progress_date: dateStr,
          parent_checked: checked
        },
        {
          onConflict: "child_id,task_id,progress_date"
        }
      );

    if (error) throw error;

    setStatus("☁️ 저장 완료");
  } catch (error) {
    console.error("엄마 확인 저장 실패:", error);

    data.parentChecks[key] = previousValue;

    setStatus("⚠️ 저장 실패");
    alert("엄마 확인 상태를 저장하지 못했어요.\n\n" + error.message);

    render();
  }
}

function tasksFor(childId, date) {
  return data.tasks.filter(task =>
    task.child_id === childId &&
    task.days.includes(date.getDay())
  );
}

function esc(value) {
  return String(value ?? "").replace(/[&<>"']/g, char => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[char]));
}

function renderChildSwitch() {
  const el = document.getElementById("childSwitch");
  el.innerHTML = data.children.map(child => `
    <button
      class="pill ${child.id === data.selectedChildId ? "active" : ""}"
      onclick="selectChild('${child.id}')"
    >${esc(child.name)}</button>
  `).join("");
}

function selectChild(childId) {
  data.selectedChildId = childId;
  saveUiState();
  render();
}

function getSelectedChild() {
  return data.children.find(child => child.id === data.selectedChildId);
}

function renderToday() {
  const root = document.getElementById("todayView");
  const now = getSelectedDate();
  const dateStr = ymd(now);
  const selectedChild = getSelectedChild();
  const list = tasksFor(data.selectedChildId, now);
  const doneCount = list.filter(t => isDone(t.id, dateStr)).length;
  const pct = list.length ? Math.round(doneCount / list.length * 100) : 0;
  const categories = [...new Set(list.map(t => t.category))];

  root.innerHTML = `
    <div class="card hero">
      <div class="hero-title">${esc(selectedChild?.name || "")}의 미션</div>
      <div class="toprow" style="justify-content:space-between">
        <button class="btn" onclick="changeDate(-1)">◀ 전날</button>
        <div style="text-align:center">
          <b>${now.getMonth()+1}월 ${now.getDate()}일 (${DAYS[now.getDay()]})</b>
          <div><input type="date" value="${dateStr}" onchange="pickDate(this.value)" style="margin-top:6px"></div>
        </div>
        <button class="btn" onclick="changeDate(1)">다음날 ▶</button>
      </div>
      <button class="btn" onclick="goToday()">오늘로 돌아가기</button>
      <div class="progress"><div style="width:${pct}%"></div></div>
      <div><b>${doneCount} / ${list.length}</b> 완료 · ${pct}%</div>
      <div class="muted">${pct === 100 && list.length ? "🎉 오늘 미션 완료!" : "하나씩 체크해 보자!"}</div>
    </div>

  <div id="todayNotes"></div>

    ${categories.map(category => {
      const rows = list
        .filter(task => task.category === category)
        .map(task => {
      const done = isDone(task.id, dateStr);
      const isStudy = task.category === "공부";

return `
  <div class="task ${isStudy ? "study-task" : ""}">
    <button
      class="check ${done ? "done" : ""}"
      onclick="toggleDone('${task.id}','${dateStr}')"
      aria-label="완료 체크"
      ${isSaving ? "disabled" : ""}
    >${done ? "✓" : ""}</button>

    <div class="task-name ${done ? "done" : ""}">
      ${esc(task.name)}
    </div>

    ${task.reward ? '<span class="badge">용돈 조건</span>' : ''}

    ${isStudy ? `
      <div class="study-progress">
        <input
          type="text"
          class="progress-note"
          placeholder="진도 입력"
          value="${esc(getProgressNote(task.id, dateStr))}"
          onchange="saveProgressNote(
            '${task.id}',
            '${dateStr}',
            this.value
          )"
        />

        <label class="parent-check">
          <input
            type="checkbox"
            ${isParentChecked(task.id, dateStr) ? "checked" : ""}
            onchange="toggleParentChecked(
              '${task.id}',
              '${dateStr}',
              this.checked
            )"
          />
          <span>👩🏻 확인완료</span>
        </label>
      </div>
    ` : ""}
  </div>
`;
    })
    .join("");

      return `
        <div class="card">
          <div class="section-title">
            <h2>${esc(category)}</h2>
          </div>

          ${rows}
        </div>
      `;
    }).join("") || `
     <div class="card empty">
       이 날짜에 등록된 일정이 없어요 🌿
     </div>
  `}
  `;

  renderTodayNotes(dateStr, data.selectedChildId);
}

async function renderTodayNotes(dateStr, childId) {
  const root = document.getElementById("todayNotes");

  if (!root) return;

  if (!childId) {
    root.innerHTML = `
      <div class="card empty">
        아이를 먼저 선택해 주세요.
      </div>
    `;
    return;
  }

  root.innerHTML = `
    <div class="card note-card">
      <div class="section-title">
        <h2>📣 오늘 알림</h2>
      </div>

      <div class="muted">
        알림을 불러오는 중...
      </div>
    </div>
  `;

  const { data: notes, error } = await supabaseClient
    .from("notes")
    .select("id, content, note_type, note_date, created_at")
    .eq("family_id", data.familyId)
    .eq("child_id", childId)
    .eq("note_date", dateStr)
    .order("created_at", { ascending: true });

  if (error) {
    console.error("알림 불러오기 실패:", error);

    root.innerHTML = `
      <div class="card note-card">
        <div class="section-title">
          <h2>📣 오늘 알림</h2>
        </div>

        <div class="empty">
          오늘 알림을 불러오지 못했어요.
        </div>
      </div>
    `;

    return;
  }

  root.innerHTML = `
    <div class="card note-card">
      <div class="section-title">
        <h2>📣 오늘 알림</h2>
      </div>

      <div id="noteList">
        ${
          notes.length
            ? notes.map(note => `
                <div class="note-row">
                <div class="note-content"><span class="note-type ${note.note_type === "notice" ? "notice" : "memo"}">${note.note_type === "notice" ? "📢 공지" : "📝 메모"}</span><span>${esc(note.content)}</span></div>

                  <div class="note-actions">
                    <button
                      class="btn small"
                      onclick="startEditNote('${note.id}', '${encodeURIComponent(note.content)}')"
                    >
                      ✏️
                    </button>

                    <button
                      class="btn small"
                      onclick="deleteNote('${note.id}')"
                    >
                      🗑️
                    </button>
                  </div>
                </div>
              `).join("")
            : `
              <div class="empty">
                등록된 알림이 없어요.
              </div>
            `
        }
      </div>

      <div id="noteEditor" style="display:none; margin-top:12px;">
        <div class="note-type-picker">
          <label>
            <input type="radio" name="noteType" value="memo" checked>
            📝 메모
          </label>

          <label>
            <input type="radio" name="noteType" value="notice">
            📢 공지
          </label>
        </div>
        <textarea
          id="noteInput"
          rows="3"
          placeholder="알림을 입력하세요"
          style="width:100%; resize:vertical;"
        ></textarea>

        <div class="toprow" style="justify-content:flex-end; margin-top:8px;">
          <button
            class="btn"
            onclick="cancelNoteEdit()"
          >
            취소
          </button>

          <button
            class="btn"
            onclick="saveNote()"
          >
            저장
          </button>
        </div>
      </div>

      <button
        id="addNoteButton"
        class="btn"
        style="margin-top:12px;"
        onclick="openNoteEditor()"
      >
        + 오늘 알림 추가
      </button>
    </div>
  `;
}

let editingNoteId = null;

function openNoteEditor() {
  editingNoteId = null;

  const editor = document.getElementById("noteEditor");
  const input = document.getElementById("noteInput");
  const button = document.getElementById("addNoteButton");

  if (!editor || !input) return;

  input.value = "";
  editor.style.display = "block";

  if (button) {
    button.style.display = "none";
  }

  input.focus();
}

function startEditNote(noteId, encodedContent) {
  editingNoteId = noteId;

  const editor = document.getElementById("noteEditor");
  const input = document.getElementById("noteInput");
  const button = document.getElementById("addNoteButton");

  if (!editor || !input) return;

  input.value = decodeURIComponent(encodedContent);
  editor.style.display = "block";

  if (button) {
    button.style.display = "none";
  }

  input.focus();
}

function cancelNoteEdit() {
  editingNoteId = null;

  const editor = document.getElementById("noteEditor");
  const input = document.getElementById("noteInput");
  const button = document.getElementById("addNoteButton");

  if (input) {
    input.value = "";
  }

  if (editor) {
    editor.style.display = "none";
  }

  if (button) {
    button.style.display = "inline-block";
  }
}

async function saveNote() {
  const input = document.getElementById("noteInput");
  const content = input?.value.trim();

  if (!content) {
    alert("메모 내용을 입력해 주세요.");
    return;
  }

  const dateStr = ymd(getSelectedDate());
  const childId = data.selectedChildId;
  const noteType =
    document.querySelector('input[name="noteType"]:checked')?.value || "memo";

  if (!childId) {
    alert("아이를 먼저 선택해 주세요.");
    return;
  }

  let error;

  if (editingNoteId) {
    const result = await supabaseClient
      .from("notes")
      .update({
        content,
        note_type: noteType,
        updated_at: new Date().toISOString()
      })
      .eq("id", editingNoteId)
      .eq("family_id", data.familyId);

    error = result.error;
  } else {
    const result = await supabaseClient
      .from("notes")
      .insert({
        family_id: data.familyId,
        child_id: childId,
        note_date: dateStr,
        content,
        note_type: noteType
      });

    error = result.error;
  }

  if (error) {
  console.error(error);
  alert(error.message);
  return;
  }

  editingNoteId = null;
  await renderTodayNotes(dateStr, childId);
}

async function deleteNote(noteId) {
  const ok = confirm("이 메모를 삭제할까요?");

  if (!ok) return;

  const { error } = await supabaseClient
    .from("notes")
    .delete()
    .eq("id", noteId)
    .eq("family_id", data.familyId);

  if (error) {
    console.error("메모 삭제 실패:", error);
    alert("메모 삭제에 실패했어요.");
    return;
  }

  const dateStr = ymd(getSelectedDate());

  await renderTodayNotes(
    dateStr,
    data.selectedChildId
  );
}

function renderWeek() {
  const root = document.getElementById("weekView");
  const selectedChild = getSelectedChild();
  const mon = mondayOf(getSelectedDate());
  const dates = [0,1,2,3,4].map(i => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });

  root.innerHTML = `
    <div class="card">
      <div class="section-title"><h2>${esc(selectedChild?.name || "")}의 주간 미션</h2></div>
      <div class="week">
        ${dates.map(d => {
          const list = tasksFor(data.selectedChildId, d);
          const ds = ymd(d);
          const doneCount = list.filter(t => isDone(t.id, ds)).length;
          return `
            <div class="daycol">
              <div class="dayhead">${d.getMonth()+1}/${d.getDate()} (${DAYS[d.getDay()]})</div>
              <div class="small muted">${doneCount}/${list.length} 완료</div>
              ${list.map(t => `<div class="mini">${isDone(t.id, ds) ? "✅" : "⬜"} ${esc(t.name)}</div>`).join("")}
            </div>`;
        }).join("")}
      </div>
    </div>`;
}

  const categories = [...(data.categories || [])]

  root.innerHTML = `
    <div class="card">
     <div class="section-title">
       <h2>카테고리 순서</h2>
     </div>

      ${categories.map((category, index) => `
        <div class="manager-item">

            <button
              class="btn"
              onclick="moveCategory('${category.id}', -1)"

            >↓</button>
          </div>
        </div>
      `).join("")}
    </div>  

    <div class="card">
      <div class="section-title"><h2>새 반복 일정 추가</h2></div>
      <div class="formgrid">
        <div>
          <label>분류</label>
          <select id="fCat">
            <option>준비</option>
            <option>아침</option>
            <option>공부</option>
            <option>학원</option>
            <option>자기 전</option>
            <option>잠</option>
            <option>기타</option>
          </select>
        </div>
        <div>
          <label>할 일</label>
          <input id="fName" placeholder="예: 원리셈 2장" />
        </div>
        <div class="full">
          <label>반복 요일</label>
          <div class="days" id="dayPick">
            ${[1,2,3,4,5,6,0].map(i => `

      ${list.map(task => `

  document.querySelectorAll(".daybtn").forEach(button => {

async function moveCategory(categoryId, direction) {
  const categories = [...data.categories]
    .sort((a, b) => a.sort_order - b.sort_order);

  const currentIndex = categories.findIndex(c => c.id === categoryId);

  if (currentIndex < 0) return;

  const targetIndex = currentIndex + direction;

  if (targetIndex < 0 || targetIndex >= categories.length) return;

  const current = categories[currentIndex];
  const target = categories[targetIndex];

  // sort_order 교환
  const currentOrder = current.sort_order;
  const targetOrder = target.sort_order;

  const { error } = await supabaseClient
    .from("categories")
    .upsert([
      { ...current, sort_order: targetOrder },
      { ...target, sort_order: currentOrder }
    ]);

  if (error) {
    console.error(error);
    alert("카테고리 순서를 저장하지 못했습니다.");
    return;
  }

  // 메모리 값도 변경
  current.sort_order = targetOrder;
  target.sort_order = currentOrder;

  data.categories.sort((a, b) => a.sort_order - b.sort_order);

  // task도 다시 정렬
  data.tasks.sort((a, b) => {
    const ca = data.categories.find(c => c.id === a.category_id)?.sort_order ?? 999;
    const cb = data.categories.find(c => c.id === b.category_id)?.sort_order ?? 999;

    if (ca !== cb) return ca - cb;

    return (a.sort_order ?? 0) - (b.sort_order ?? 0);
  });

  render();
}

async function addTask() {
  const name = document.getElementById("fName").value.trim();
  if (!name) {
    alert("할 일을 입력해 주세요.");
    return;
  }

  const days = [...document.querySelectorAll(".daybtn.active")]
    .map(button => Number(button.dataset.day));

  if (!days.length) {
    alert("반복 요일을 하나 이상 선택해 주세요.");
    return;
  }

  const childTasks = data.tasks.filter(t => t.child_id === data.selectedChildId);
  const nextSortOrder = childTasks.length
    ? Math.max(...childTasks.map(t => Number(t.sort_order) || 0)) + 1
    : 1;

  const newTask = {
    family_id: data.familyId,
    child_id: data.selectedChildId,
    category: document.getElementById("fCat").value,
    name,
    days,
    reward_enabled: document.getElementById("fReward").checked,
    reward_points: 0,
    is_active: true,
    sort_order: nextSortOrder
  };

  setStatus("일정을 저장하는 중...");

  const { data: inserted, error } = await supabaseClient
    .from("tasks")
    .insert(newTask)
    .select("id, family_id, child_id, name, category, days, reward_enabled, reward_points, is_active, sort_order")
    .single();

  if (error) {
    console.error("일정 추가 실패:", error);
    setStatus("⚠️ 일정 저장 실패");
    alert("일정을 추가하지 못했어요.\n\n" + error.message);
    return;
  }

  data.tasks.push({
    ...inserted,
    days: Array.isArray(inserted.days) ? inserted.days.map(Number) : [],
    reward: !!inserted.reward_enabled
  });

  setStatus("☁️ 일정 저장 완료");
  render();
}

async function deleteTask(id) {
  if (!confirm("이 일정을 삭제할까요?")) return;

  setStatus("일정을 삭제하는 중...");

  const { error } = await supabaseClient
    .from("tasks")
    .update({ is_active: false })
    .eq("id", id)
    .eq("family_id", data.familyId);

  if (error) {
    console.error("일정 삭제 실패:", error);
    setStatus("⚠️ 일정 삭제 실패");
    alert("일정을 삭제하지 못했어요.\n\n" + error.message);
    return;
  }

  data.tasks = data.tasks.filter(task => task.id !== id);
  setStatus("☁️ 일정 삭제 완료");
  render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = `family-quest-backup-${ymd(new Date())}.json`;
  link.click();
  URL.revokeObjectURL(url);
}

async function reloadData() {
  try {
    await loadFromSupabase();
    render();
  } catch (error) {
    console.error(error);
    setStatus("⚠️ 다시 불러오기 실패");
    alert(error.message);
  }
}

function render() {
  renderChildSwitch();

  document.getElementById("todayView").classList.toggle("hidden", currentView !== "today");
  document.getElementById("weekView").classList.toggle("hidden", currentView !== "week");
  document.getElementById("manageView").classList.toggle("hidden", currentView !== "manage");

  document.querySelectorAll("nav button").forEach(button => {
    button.classList.toggle("active", button.dataset.view === currentView);
  });

  if (currentView === "today") renderToday();
  if (currentView === "week") renderWeek();
  if (currentView === "manage") renderManage();
}

document.querySelectorAll("nav button").forEach(button => {
  button.onclick = () => {
    currentView = button.dataset.view;
    saveUiState();
    render();
  };
});

let refreshingForUpdate = false;

function showUpdateStatus(message) {
  const status = document.getElementById("syncStatus");
  if (status) status.textContent = message;
}

async function registerAutoUpdate() {
  if (!("serviceWorker" in navigator)) return;

  try {
    const registration = await navigator.serviceWorker.register("./sw.js", {
      updateViaCache: "none"
    });

    // 앱을 열 때마다 GitHub Pages에 새 sw.js가 있는지 확인
    await registration.update();

    // 새 서비스워커가 이미 대기 중이라면 바로 적용
    if (registration.waiting) {
      showUpdateStatus("🔄 새 버전을 적용하는 중...");
      registration.waiting.postMessage({ type: "SKIP_WAITING" });
    }

    registration.addEventListener("updatefound", () => {
      const newWorker = registration.installing;
      if (!newWorker) return;

      newWorker.addEventListener("statechange", () => {
        if (
          newWorker.state === "installed" &&
          navigator.serviceWorker.controller
        ) {
          showUpdateStatus("🔄 새 버전을 적용하는 중...");
          newWorker.postMessage({ type: "SKIP_WAITING" });
        }
      });
    });

    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (refreshingForUpdate) return;
      refreshingForUpdate = true;

      // 주소의 ?ver=10 같은 값을 제거한 뒤 최신 화면으로 새로고침
      const cleanUrl = location.pathname + location.hash;
      history.replaceState(null, "", cleanUrl);
      location.reload();
    });

    // 앱을 계속 켜 둔 경우에도 10분마다 업데이트 확인
    setInterval(() => registration.update(), 10 * 60 * 1000);

    // 홈 화면 앱을 다시 열었을 때 업데이트 확인
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        registration.update();
      }
    });
  } catch (error) {
    console.error("서비스워커 등록 실패:", error);
  }
}

registerAutoUpdate();


async function startApp() {
  loadUiState();

  try {
    await loadFromSupabase();
    render();
  } catch (error) {
    console.error("앱 시작 실패:", error);
    setStatus("⚠️ Supabase 연결 실패");
    alert("앱을 불러오지 못했어요.\n\n" + error.message);
  }
}

startApp();
