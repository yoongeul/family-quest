<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fff7cc" />
  <title> 🍀 I CAN DO IT 🐻🐰  </title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
<div class="app">
  <header>
    <h1>♥️ 오늘을 응원해 🍀</h1>
    <div class="toprow" id="childSwitch"></div>
    <div id="syncStatus" class="status">불러오는 중...</div>
  </header>

  <main>
    <section id="todayView"></section>
    <section id="weekView" class="hidden"></section>
    <section id="manageView" class="hidden"></section>
  </main>

  <nav>
    <div class="inner">
      <button data-view="today" class="active">✅ 오늘</button>
      <button data-view="week">📅 주간</button>
      <button data-view="manage">🧰 관리</button>
    </div>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://zuideuvsykcbwiweyzho.supabase.co";
const SUPABASE_KEY = "sb_publishable_djj2HLiCWAW3UBnnEUXb-A_KeKtrLjG";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const DAYS = ["일", "월", "화", "수", "목", "금", "토"];
const WEEKDAYS = [1, 2, 3, 4, 5];
const LOCAL_KEY = "familyQuestUiStateV2";

let currentView = "today";
let isSaving = false;

let data = {
  familyId: null,
  children: [],
  selectedChildId: null,
  selectedDate: null,
  tasks: [],
  completions: {},
  progressNotes: {},
  parentChecks: {}
};

let statusTimer;

function setStatus(message) {
  const el = document.getElementById("syncStatus");

  clearTimeout(statusTimer);

  el.textContent = message;

  if (message) {
    statusTimer = setTimeout(() => {
      el.textContent = "";
    }, 800);
  }
}

function saveUiState() {
  localStorage.setItem(LOCAL_KEY, JSON.stringify({
    selectedChildId: data.selectedChildId,
    currentView
  }));
}

function loadUiState() {
  try {
    const saved = JSON.parse(localStorage.getItem(LOCAL_KEY) || "{}");
    data.selectedChildId = saved.selectedChildId || null;
    data.selectedDate = saved.selectedDate || ymd(new Date());
    currentView = ["today", "week", "manage"].includes(saved.currentView)
      ? saved.currentView
      : "today";
  } catch {
    data.selectedDate = ymd(new Date());
  }
}

async function loadFromSupabase() {
  setStatus("가족 정보를 불러오는 중...");

  const { data: family, error: familyError } = await supabaseClient
    .from("families")
    .select("id, name")
    .eq("name", "우리가족")
    .maybeSingle();

  if (familyError) throw familyError;
  if (!family) throw new Error("families 테이블에 '우리가족' 행이 없어요.");

  data.familyId = family.id;

  const [childrenResult, categoriesResult, tasksResult, progressResult] = await Promise.all([
    supabaseClient
      .from("children")
      .select("id, name, color, avatar, sort_order")
      .eq("family_id", data.familyId)
      .order("sort_order", { ascending: true }),

    supabaseClient
      .from("categories")
      .select("id, family_id, name, sort_order")
      .eq("family_id", data.familyId)
      .order("sort_order", { ascending: true }),
    
    supabaseClient
      .from("tasks")
      .select(`
      id,
      family_id,
      child_id,
      name,
      category,
      category_id,
      days,
      reward_enabled,
      reward_points,
      is_active,
      sort_order,
      categories (
        id,
        name,
        sort_order
        )
      `)
      .eq("family_id", data.familyId)
      .eq("is_active", true),

    supabaseClient
      .from("progress")
      .select("id, family_id, child_id, task_id, progress_date, completed, progress_note, parent_checked")
      .eq("family_id", data.familyId)
  ]);

console.log("childrenResult", childrenResult);
console.log("categoriesResult", categoriesResult);
console.log("tasksResult", tasksResult);
console.log("progressResult", progressResult);

  if (childrenResult.error) throw childrenResult.error;
  if (tasksResult.error) throw tasksResult.error;
  if (progressResult.error) throw progressResult.error;

  data.children = childrenResult.data || [];
  data.categories = categoriesResult.data || [];

  console.log("categoriesResult.data:", categoriesResult.data);
  console.log("categoriesResult.error:", categoriesResult.error);
  console.log("familyId:", data.familyId);

  data.tasks = (tasksResult.data || [])
    .sort((a, b) => {
      const categoryOrderA = a.categories?.sort_order ?? 999;
      const categoryOrderB = b.categories?.sort_order ?? 999;

      if (categoryOrderA !== categoryOrderB) {
      return categoryOrderA - categoryOrderB;
    }

      return (a.sort_order ?? 0) - (b.sort_order ?? 0);
    })
    .map(task => ({
      ...task,
      days: Array.isArray(task.days) ? task.days.map(Number) : [],
      reward: !!task.reward_enabled
    }));

  data.completions = {};
  data.progressNotes = {};
  data.parentChecks = {};
for (const row of progressResult.data || []) {
  const key = `${row.progress_date}|${row.task_id}`;

  data.completions[key] = !!row.completed;
  data.progressNotes[key] = row.progress_note || "";
  data.parentChecks[key] = !!row.parent_checked;
}

  const selectedStillExists = data.children.some(c => c.id === data.selectedChildId);
  if (!selectedStillExists) {
    data.selectedChildId = data.children[0]?.id || null;
  }

  saveUiState();
  setStatus("☁️ Supabase와 동기화됨");
}

function ymd(date = new Date()) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function parseYmd(value) {
  if (!value) return new Date();
  const [y, m, d] = value.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function getSelectedDate() {
  return data.selectedDate ? parseYmd(data.selectedDate) : new Date();
}

function changeDate(offset) {
  const d = getSelectedDate();
  d.setDate(d.getDate() + offset);
  data.selectedDate = ymd(d);
  saveUiState();
  render();
}

function goToday() {
  data.selectedDate = ymd(new Date());
  saveUiState();
  render();
}

function pickDate(value) {
  if (!value) return;
  data.selectedDate = value;
  saveUiState();
  render();
}

function mondayOf(date = new Date()) {
  const x = new Date(date);
  const day = x.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  x.setDate(x.getDate() + diff);
  x.setHours(0, 0, 0, 0);
  return x;
}

function isDone(taskId, dateStr) {
  return !!data.completions[`${dateStr}|${taskId}`];
}

async function toggleDone(taskId, dateStr) {
  if (isSaving) return;

  const task = data.tasks.find(task => task.id === taskId);
  if (!task) return;

  const key = `${dateStr}|${taskId}`;
  const previousValue = !!data.completions[key];
  const nextValue = !previousValue;

  data.completions[key] = nextValue;
  isSaving = true;

  setStatus("저장 중...");
  renderTodayTasks();

  try {
    const { error } = await supabaseClient
      .from("progress")
      .upsert(
        {
          family_id: data.familyId,
          child_id: task.child_id,
          task_id: task.id,
          progress_date: dateStr,
          completed: nextValue
        },
        {
          onConflict: "child_id,task_id,progress_date"
        }
      );

    if (error) throw error;

    setStatus("☁️ 저장 완료");
  } catch (error) {
    console.error("체크 저장 실패:", error);

    data.completions[key] = previousValue;
    setStatus("⚠️ 저장 실패");

    renderTodayTasks();

    alert(
      "체크 상태를 저장하지 못했어요.\n\n" +
      error.message
    );
  } finally {
    isSaving = false;

    // disabled 상태를 풀기 위해 할 일 부분만 다시 그림
    renderTodayTasks();
  }
}

function getProgressNote(taskId, dateStr) {
  const key = `${dateStr}|${taskId}`;
  return data.progressNotes[key] || "";
}

function isParentChecked(taskId, dateStr) {
  const key = `${dateStr}|${taskId}`;
  return !!data.parentChecks[key];
}

async function saveProgressNote(taskId, dateStr, value) {
  const task = data.tasks.find(t => t.id === taskId);
  if (!task) return;

  const key = `${dateStr}|${taskId}`;
  const previousValue = data.progressNotes[key] || "";
  const nextValue = value.trim();

  data.progressNotes[key] = nextValue;
  setStatus("저장 중...");

  try {
    const { error } = await supabaseClient
      .from("progress")
      .upsert(
        {
          family_id: data.familyId,
          child_id: task.child_id,
          task_id: task.id,
          progress_date: dateStr,
          progress_note: nextValue
        },
        {
          onConflict: "child_id,task_id,progress_date"
        }
      );

    if (error) throw error;

    setStatus("☁️ 저장 완료");
  } catch (error) {
    console.error("진도 저장 실패:", error);

    data.progressNotes[key] = previousValue;

    setStatus("⚠️ 저장 실패");
    alert("진도를 저장하지 못했어요.\n\n" + error.message);

    render();
  }
}

async function toggleParentChecked(taskId, dateStr, checked) {
  const task = data.tasks.find(t => t.id === taskId);
  if (!task) return;

  const key = `${dateStr}|${taskId}`;
  const previousValue = !!data.parentChecks[key];

  data.parentChecks[key] = checked;
  setStatus("저장 중...");

  try {
    const { error } = await supabaseClient
      .from("progress")
      .upsert(
        {
          family_id: data.familyId,
          child_id: task.child_id,
          task_id: task.id,
          progress_date: dateStr,
          parent_checked: checked
        },
        {
          onConflict: "child_id,task_id,progress_date"
        }
      );

    if (error) throw error;

    setStatus("☁️ 저장 완료");
  } catch (error) {
    console.error("엄마 확인 저장 실패:", error);

    data.parentChecks[key] = previousValue;

    setStatus("⚠️ 저장 실패");
    alert("엄마 확인 상태를 저장하지 못했어요.\n\n" + error.message);

    render();
  }
}

function tasksFor(childId, date) {
  return data.tasks.filter(task =>
    task.child_id === childId &&
    task.days.includes(date.getDay())
  );
}

function esc(value) {
  return String(value ?? "").replace(/[&<>"']/g, char => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[char]));
}

function renderChildSwitch() {
  const el = document.getElementById("childSwitch");
  el.innerHTML = data.children.map(child => `
    <button
      class="pill ${child.id === data.selectedChildId ? "active" : ""}"
      onclick="selectChild('${child.id}')"
    >${esc(child.name)}</button>
  `).join("");
}

function selectChild(childId) {
  data.selectedChildId = childId;
  saveUiState();
  render();
}

function getSelectedChild() {
  return data.children.find(child => child.id === data.selectedChildId);
}

function renderToday() {
  const root = document.getElementById("todayView");
  const dateStr = ymd(getSelectedDate());

  root.innerHTML = `
    <div id="todayHero"></div>
    <div id="todayNotes"></div>
    <div id="todayTasks"></div>
  `;

  renderTodayTasks();
  renderTodayNotes(dateStr, data.selectedChildId);
  updateStickyHeights();
}

function updateStickyHeights() {
  const header = document.querySelector("header");
  const todayHero = document.getElementById("todayHero");

  if (header) {
    document.documentElement.style.setProperty(
      "--header-height",
      `${header.offsetHeight}px`
    );
  }

  if (todayHero) {
    document.documentElement.style.setProperty(
      "--today-hero-height",
      `${todayHero.offsetHeight}px`
    );
  }
}

function renderTodayTasks() {
  const heroRoot = document.getElementById("todayHero");
  const tasksRoot = document.getElementById("todayTasks");

  if (!heroRoot || !tasksRoot) return;

  const now = getSelectedDate();
  const dateStr = ymd(now);
  const selectedChild = getSelectedChild();
  const list = tasksFor(data.selectedChildId, now);

  const doneCount = list.filter(task =>
    isDone(task.id, dateStr)
  ).length;

  const pct = list.length
    ? Math.round(doneCount / list.length * 100)
    : 0;

  const categories = [
    ...new Set(list.map(task => task.category))
  ];

  heroRoot.innerHTML = `
  <div class="card hero compact-hero">
    <div class="compact-hero-top">
      <button class="btn compact-btn" onclick="changeDate(-1)">
        ◀
      </button>

      <div class="compact-date">
        <strong>
          ${esc(selectedChild?.name || "")} ·
          ${now.getMonth() + 1}월 ${now.getDate()}일
          (${DAYS[now.getDay()]})
        </strong>

        <input
          class="compact-date-input"
          type="date"
          value="${dateStr}"
          onchange="pickDate(this.value)"
        >
      </div>

      <button class="btn compact-btn" onclick="changeDate(1)">
        ▶
      </button>

      <button class="btn compact-today-btn" onclick="goToday()">
        오늘
      </button>
    </div>

    <div class="compact-progress-row">
      <div class="progress compact-progress">
        <div style="width:${pct}%"></div>
      </div>

      <div class="compact-progress-text">
        <b>${doneCount}/${list.length}</b> · ${pct}%
      </div>
    </div>
  </div>
`;

  tasksRoot.innerHTML =
    categories.map(category => {
      const rows = list
        .filter(task => task.category === category)
        .map(task => {
          const done = isDone(task.id, dateStr);
          const isStudy = task.category === "공부";

          return `
            <div class="task ${isStudy ? "study-task" : ""}">
              <button
                class="check ${done ? "done" : ""}"
                onclick="toggleDone('${task.id}', '${dateStr}')"
                aria-label="완료 체크"
                ${isSaving ? "disabled" : ""}
              >
                ${done ? "✓" : ""}
              </button>

              <div class="task-name ${done ? "done" : ""}">
                ${esc(task.name)}
              </div>

              ${
                task.reward
                  ? '<span class="badge">용돈 조건</span>'
                  : ""
              }

              ${
                isStudy
                  ? `
                    <div class="study-progress">
                      <input
                        type="text"
                        class="progress-note"
                        placeholder="진도 입력"
                        value="${esc(
                          getProgressNote(task.id, dateStr)
                        )}"
                        onchange="saveProgressNote(
                          '${task.id}',
                          '${dateStr}',
                          this.value
                        )"
                      />

                      <label class="parent-check">
                        <input
                          type="checkbox"
                          ${
                            isParentChecked(task.id, dateStr)
                              ? "checked"
                              : ""
                          }
                          onchange="toggleParentChecked(
                            '${task.id}',
                            '${dateStr}',
                            this.checked
                          )"
                        />

                        <span>👩🏻 확인완료</span>
                      </label>
                    </div>
                  `
                  : ""
              }
            </div>
          `;
        })
        .join("");

      return `
        <div class="card">
          <div class="section-title">
            <h2>${esc(category)}</h2>
          </div>

          ${rows}
        </div>
      `;
    })
    .join("") ||
    `
      <div class="card empty">
        이 날짜에 등록된 일정이 없어요 🌿
      </div>
    `;
}

async function renderTodayNotes(dateStr, childId) {
  const root = document.getElementById("todayNotes");

  if (!root) return;

  if (!childId) {
    root.innerHTML = `
      <div class="card empty">
        아이를 먼저 선택해 주세요.
      </div>
    `;
    return;
  }

  if (!root.innerHTML.trim()) {
    root.innerHTML = `
      <div class="card note-card">
        <div class="section-title">
          <h2>📣 오늘 알림</h2>
        </div>

        <div class="muted">
         알림을 불러오는 중...
        </div>
      </div>
    `;
  }

  const [
  { data: noticeNotes, error: noticeError },
  { data: memoNotes, error: memoError }
  ] = await Promise.all([
    supabaseClient
      .from("notes")
      .select("id, content, note_type, note_date, created_at")
      .eq("family_id", data.familyId)
      .eq("note_type", "notice")
      .eq("note_date", dateStr)
      .is("child_id", null)
      .order("created_at", { ascending: true }),

    supabaseClient
      .from("notes")
      .select("id, content, note_type, note_date, created_at")
      .eq("family_id", data.familyId)
      .eq("child_id", childId)
      .eq("note_type", "memo")
      .eq("note_date", dateStr)
      .order("created_at", { ascending: true })
  ]);

  const error = noticeError || memoError;

  if (error) {
    console.error("알림 불러오기 실패:", error);

    root.innerHTML = `
      <div class="card note-card">
        <div class="muted">
          알림을 불러오지 못했습니다.
        </div>
      </div>
    `;

    return;
  }

  root.innerHTML = `
  <div class="today-info-bar">
    ${renderNoteBox("notice", "📢 공지", noticeNotes)}
    ${renderNoteBox("memo", "📝 메모", memoNotes)}
    ${renderNoteEditor()}
  </div>
`;
const noteTypeRadios =
  document.querySelectorAll('input[name="noteType"]');

const noticeDateWrap =
  document.getElementById("noticeDateWrap");

const noticeDateInput =
  document.getElementById("noticeDate");

noteTypeRadios.forEach(radio => {
  radio.addEventListener("change", () => {
    const selectedType =
      document.querySelector('input[name="noteType"]:checked')?.value;

    const isNotice = selectedType === "notice";

    noticeDateWrap.style.display =
      isNotice ? "block" : "none";

    if (isNotice && !noticeDateInput.value) {
      noticeDateInput.value = ymd(getSelectedDate());
    }
  });
});

  updateStickyHeights();
}

function renderNoteBox(type, title, notes) {
  const emptyText =
    type === "notice"
      ? "등록된 공지가 없어요."
      : "등록된 메모가 없어요.";

  const noteRows = notes.length
    ? notes.map(note => `
        <div class="note-row">
          <div class="note-content">
            <span>${esc(note.content)}</span>
          </div>

          <div class="note-actions">
            <button
              type="button"
              class="info-icon-btn"
              onclick="startEditNote(
                '${note.id}',
                '${encodeURIComponent(note.content)}'
                '${type}'
              )"
              aria-label="${title} 수정"
              title="수정"
            >
              ✏️
            </button>

            <button
              type="button"
              class="info-icon-btn"
              onclick="deleteNote('${note.id}')"
              aria-label="${title} 삭제"
              title="삭제"
            >
              🗑️
            </button>
          </div>
        </div>
      `).join("")
    : `<div class="empty">${emptyText}</div>`;

  return `
    <div class="today-info-box ${type}-box">
      <div class="today-info-title">${title}</div>

      <div class="today-info-list">
        ${noteRows}
      </div>

      <button
        type="button"
        class="info-icon-btn info-add-btn"
        onclick="openNoteEditor('${type}')"
        aria-label="${title} 추가"
        title="추가"
      >
        ＋
      </button>
    </div>
  `;
}

function renderNoteEditor() {
  return `
    <div id="noteEditor" style="display:none; margin-top:8px;">
      <div class="note-type-picker">
        <label>
          <input
            type="radio"
            name="noteType"
            value="memo"
            checked
          >
          📝 메모
        </label>

        <label>
          <input
            type="radio"
            name="noteType"
            value="notice"
          >
          📢 공지
        </label>
      </div>

      <div id="noticeDateWrap" style="display:none; margin-top:8px;">
        <label for="noticeDate">공지 날짜</label>
        <input
          type="date"
          id="noticeDate"
        >
      </div>

      <textarea
        id="noteInput"
        rows="2"
        placeholder="내용을 입력하세요"
        style="width:100%; resize:vertical;"
      ></textarea>

      <div
        class="toprow"
        style="justify-content:flex-end; margin-top:8px;"
      >
        <button class="btn" onclick="cancelNoteEdit()">
          취소
        </button>

        <button class="btn" onclick="saveNote()">
          저장
        </button>
      </div>
    </div>
  `;
}


updateStickyHeights();

let editingNoteId = null;

function openNoteEditor(type = "memo") {
  editingNoteId = null;

  const editor = document.getElementById("noteEditor");
  const input = document.getElementById("noteInput");
  const typeRadio = document.querySelector(
    `input[name="noteType"][value="${type}"]`
  );

  if (!editor || !input) return;

  input.value = "";

  if (typeRadio) {
    typeRadio.checked = true;
  }

  editor.style.display = "block";
  input.focus();
}

function startEditNote(noteId, encodedContent, type = "memo") {
  editingNoteId = noteId;

  const editor = document.getElementById("noteEditor");
  const input = document.getElementById("noteInput");
  const typeRadio = document.querySelector(
    `input[name="noteType"][value="${type}"]`
  );

  if (!editor || !input) return;

  input.value = decodeURIComponent(encodedContent);

  if (typeRadio) {
    typeRadio.checked = true;
  }

  editor.style.display = "block";
  input.focus();
}

function cancelNoteEdit() {
  editingNoteId = null;

  const editor = document.getElementById("noteEditor");
  const input = document.getElementById("noteInput");

  if (input) {
    input.value = "";
  }

  if (editor) {
    editor.style.display = "none";
  }
}

async function saveNote() {
  const input = document.getElementById("noteInput");
  const content = input?.value.trim();

  if (!content) {
    alert("내용을 입력해 주세요.");
    return;
  }

  const selectedDateStr = ymd(getSelectedDate());
  const childId = data.selectedChildId;

  const noteType =
    document.querySelector('input[name="noteType"]:checked')?.value || "memo";

  // 공지는 지정 날짜, 메모는 현재 보고 있는 날짜
  const noticeDateInput = document.getElementById("noticeDate");

  const noteDate =
    noteType === "notice"
      ? noticeDateInput?.value
      : selectedDateStr;

  if (noteType === "notice" && !noteDate) {
    alert("공지 날짜를 선택해 주세요.");
    return;
  }

  // 메모일 때만 아이 선택이 필요함
  if (noteType === "memo" && !childId) {
    alert("아이를 먼저 선택해 주세요.");
    return;
  }

  const noteData = {
    content,
    note_type: noteType,
    note_date: noteDate,

    // 공지는 가족 공통, 메모는 현재 아이
    child_id: noteType === "notice" ? null : childId
  };

  let error;

  if (editingNoteId) {
    const result = await supabaseClient
      .from("notes")
      .update({
        ...noteData,
        updated_at: new Date().toISOString()
      })
      .eq("id", editingNoteId)
      .eq("family_id", data.familyId);

    error = result.error;
  } else {
    const result = await supabaseClient
      .from("notes")
      .insert({
        family_id: data.familyId,
        ...noteData
      });

    error = result.error;
  }

  if (error) {
    console.error("공지/메모 저장 실패:", error);
    alert(error.message);
    return;
  }

  editingNoteId = null;
  input.value = "";

  await renderTodayNotes(
    selectedDateStr,
    data.selectedChildId
  );
}

async function deleteNote(noteId) {
  const ok = confirm("이 공지/메모를 삭제할까요?");

  if (!ok) return;

  const { error } = await supabaseClient
    .from("notes")
    .delete()
    .eq("id", noteId)
    .eq("family_id", data.familyId);

  if (error) {
    console.error("공지/메모 삭제 실패:", error);
    alert(error.message);
    return;
  }

  if (editingNoteId === noteId) {
    editingNoteId = null;
  }

  await renderTodayNotes(
    ymd(getSelectedDate()),
    data.selectedChildId
  );
}

async function moveCategory(categoryId, direction) {
  const categories = [...data.categories]
    .sort((a, b) => a.sort_order - b.sort_order);

  const currentIndex = categories.findIndex(c => c.id === categoryId);

  if (currentIndex < 0) return;

  const targetIndex = currentIndex + direction;

  if (targetIndex < 0 || targetIndex >= categories.length) return;

  const current = categories[currentIndex];
  const target = categories[targetIndex];

  // sort_order 교환
  const currentOrder = current.sort_order;
  const targetOrder = target.sort_order;

  const { error } = await supabaseClient
    .from("categories")
    .upsert([
      { ...current, sort_order: targetOrder },
      { ...target, sort_order: currentOrder }
    ]);

  if (error) {
    console.error(error);
    alert("카테고리 순서를 저장하지 못했습니다.");
    return;
  }

  // 메모리 값도 변경
  current.sort_order = targetOrder;
  target.sort_order = currentOrder;

  data.categories.sort((a, b) => a.sort_order - b.sort_order);

  // task도 다시 정렬
  data.tasks.sort((a, b) => {
    const ca = data.categories.find(c => c.id === a.category_id)?.sort_order ?? 999;
    const cb = data.categories.find(c => c.id === b.category_id)?.sort_order ?? 999;

    if (ca !== cb) return ca - cb;

    return (a.sort_order ?? 0) - (b.sort_order ?? 0);
  });

  render();
}

async function addTask() {
  const name = document.getElementById("fName").value.trim();
  if (!name) {
    alert("할 일을 입력해 주세요.");
    return;
  }

  const days = [...document.querySelectorAll(".daybtn.active")]
    .map(button => Number(button.dataset.day));

  if (!days.length) {
    alert("반복 요일을 하나 이상 선택해 주세요.");
    return;
  }

  const childTasks = data.tasks.filter(t => t.child_id === data.selectedChildId);
  const nextSortOrder = childTasks.length
    ? Math.max(...childTasks.map(t => Number(t.sort_order) || 0)) + 1
    : 1;

  const categoryName = document.getElementById("fCat").value;

  const { data: selectedCategory, error: categoryError } =
   await supabaseClient
    .from("categories")
    .select("id")
    .eq("family_id", data.familyId)
    .eq("name", categoryName)
    .maybeSingle();

  if (categoryError) {
    console.error("카테고리 조회 실패:", categoryError);
    alert("카테고리를 확인하지 못했어요.\n\n" + categoryError.message);
    return;
  }

  if (!selectedCategory) {
    alert(`"${categoryName}" 카테고리를 찾지 못했어요.`);
    return;
  }

const newTask = {
  family_id: data.familyId,
  child_id: data.selectedChildId,
  category_id: selectedCategory.id,
  category: categoryName,
  name,
  days,
  reward_enabled: document.getElementById("fReward").checked,
  reward_points: 0,
  is_active: true,
  sort_order: nextSortOrder
};

  setStatus("일정을 저장하는 중...");

  const { data: inserted, error } = await supabaseClient
    .from("tasks")
    .insert(newTask)
    .select("id, family_id, child_id, name, category, days, reward_enabled, reward_points, is_active, sort_order")
    .single();

  if (error) {
    console.error("일정 추가 실패:", error);
    setStatus("⚠️ 일정 저장 실패");
    alert("일정을 추가하지 못했어요.\n\n" + error.message);
    return;
  }

  data.tasks.push({
    ...inserted,
    days: Array.isArray(inserted.days) ? inserted.days.map(Number) : [],
    reward: !!inserted.reward_enabled
  });

  setStatus("☁️ 일정 저장 완료");
  render();
}

async function deleteTask(id) {
  if (!confirm("이 일정을 삭제할까요?")) return;

  setStatus("일정을 삭제하는 중...");

  const { error } = await supabaseClient
    .from("tasks")
    .update({ is_active: false })
    .eq("id", id)
    .eq("family_id", data.familyId);

  if (error) {
    console.error("일정 삭제 실패:", error);
    setStatus("⚠️ 일정 삭제 실패");
    alert("일정을 삭제하지 못했어요.\n\n" + error.message);
    return;
  }

  data.tasks = data.tasks.filter(task => task.id !== id);
  setStatus("☁️ 일정 삭제 완료");
  render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = `family-quest-backup-${ymd(new Date())}.json`;
  link.click();
  URL.revokeObjectURL(url);
}

let refreshingForUpdate = false;

function showUpdateStatus(message) {
  const status = document.getElementById("syncStatus");
  if (status) status.textContent = message;
}

async function registerAutoUpdate() {
  if (!("serviceWorker" in navigator)) return;

  try {
    const registration = await navigator.serviceWorker.register("./sw.js", {
      updateViaCache: "none"
    });

    // 앱을 열 때마다 GitHub Pages에 새 sw.js가 있는지 확인
    await registration.update();

    // 새 서비스워커가 이미 대기 중이라면 바로 적용
    if (registration.waiting) {
      showUpdateStatus("🔄 새 버전을 적용하는 중...");
      registration.waiting.postMessage({ type: "SKIP_WAITING" });
    }

    registration.addEventListener("updatefound", () => {
      const newWorker = registration.installing;
      if (!newWorker) return;

      newWorker.addEventListener("statechange", () => {
        if (
          newWorker.state === "installed" &&
          navigator.serviceWorker.controller
        ) {
          showUpdateStatus("🔄 새 버전을 적용하는 중...");
          newWorker.postMessage({ type: "SKIP_WAITING" });
        }
      });
    });

    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (refreshingForUpdate) return;
      refreshingForUpdate = true;

      // 주소의 ?ver=10 같은 값을 제거한 뒤 최신 화면으로 새로고침
      const cleanUrl = location.pathname + location.hash;
      history.replaceState(null, "", cleanUrl);
      location.reload();
    });

    // 앱을 계속 켜 둔 경우에도 10분마다 업데이트 확인
    setInterval(() => registration.update(), 10 * 60 * 1000);

    // 홈 화면 앱을 다시 열었을 때 업데이트 확인
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        registration.update();
      }
    });
  } catch (error) {
    console.error("서비스워커 등록 실패:", error);
  }
}

registerAutoUpdate();
